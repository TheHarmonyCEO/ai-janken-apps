<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIじゃんけん - 最終形態</title>
    
    <link rel="stylesheet" href="style.css?v=6">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>AIじゃんけん</h1>
        
        <div id="streak-display" class="streak-container" style="display: none;">
            現在 <span id="win-streak-count">0</span> 連勝中！
        </div>

        <p id="status-text">難易度を選んで「スタート」を押してください！</p>
        
        <div id="mode-area" class="mode-selection">
            <button class="mode-btn" onclick="setDifficulty('hospitality')">🥂接待🥂</button>
            <button class="mode-btn active" onclick="setDifficulty('normal')">ノーマル✊️✌️✋️</button>
            <button class="mode-btn" onclick="setDifficulty('oni')">☠️絶望☠️</button>
        </div>

        <button id="start-btn">ゲームスタート</button>
        
        <div class="game-area" id="game-area" style="display: none;">
            <div class="video-container">
                <video class="input_video" autoplay playsinline></video>
                <div class="overlay-text" id="camera-status">カメラ待機中...</div>
            </div>
            
            <div id="hp-board" class="hp-board">
                <div class="hp-container">
                    <div class="hp-label">あなた: <span id="player-hp-text">100</span></div>
                    <div class="hp-bar-bg"><div id="player-hp-bar" class="hp-bar-fill"></div></div>
                </div>
                <div class="hp-container">
                    <div class="hp-label">PC: <span id="pc-hp-text">100</span></div>
                    <div class="hp-bar-bg"><div id="pc-hp-bar" class="hp-bar-fill"></div></div>
                </div>
            </div>

            <div class="result-board">
                <div class="player-hand">
                    <h3>あなた (<span id="input-source">-</span>)</h3>
                    <div id="user-hand-display" class="hand-icon">❔</div>
                </div>
                <div class="vs">VS</div>
                <div class="pc-hand">
                    <h3>PC</h3>
                    <div id="pc-hand-display" class="hand-icon">❔</div>
                </div>
            </div>
            
            <h2 id="result-text" class="result-text"></h2>
            <button id="reset-btn" style="display: none;">次のラウンドへ</button>
        </div>
    </div>
    
    <script src="script.js?v=8"></script>
</body>
</html>
