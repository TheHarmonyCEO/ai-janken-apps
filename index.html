<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIгҒҳгӮғгӮ“гҒ‘гӮ“ - жңҖзөӮеҪўж…Ӣ</title>
    
    <link rel="stylesheet" href="style.css?v=9">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>AIгҒҳгӮғгӮ“гҒ‘гӮ“</h1>
        
        <div id="streak-display" class="streak-container" style="display: none;">
            зҸҫеңЁ <span id="win-streak-count">0</span> йҖЈеӢқдёӯпјҒ
        </div>

        <p id="status-text">йӣЈжҳ“еәҰгӮ’йҒёгӮ“гҒ§гҖҢгӮ№гӮҝгғјгғҲгҖҚгӮ’жҠјгҒ—гҒҰгҒҸгҒ гҒ•гҒ„пјҒ</p>
        
        <div id="mode-area" class="mode-selection">
            <button id="btn-hospitality" class="mode-btn" onclick="setDifficulty('hospitality')">рҹҘӮжҺҘеҫ…рҹҘӮ</button>
            <button id="btn-normal" class="mode-btn active" onclick="setDifficulty('normal')">гғҺгғјгғһгғ«вңҠпёҸвңҢпёҸвңӢпёҸ</button>
            <button id="btn-oni" class="mode-btn" onclick="setDifficulty('oni')">вҳ пёҸзө¶жңӣвҳ пёҸ</button>
        </div>

        <button id="start-btn">гӮІгғјгғ гӮ№гӮҝгғјгғҲ</button>
        
        <div class="game-area" id="game-area" style="display: none;">
            <div class="video-container">
                <video class="input_video" autoplay playsinline></video>
                <div class="overlay-text" id="camera-status">гӮ«гғЎгғ©еҫ…ж©ҹдёӯ...</div>
            </div>
            
            <div id="hp-board" class="hp-board">
                <div class="hp-container">
                    <div class="hp-label">гҒӮгҒӘгҒҹ: <span id="player-hp-text">100</span></div>
                    <div class="hp-bar-bg"><div id="player-hp-bar" class="hp-bar-fill"></div></div>
                </div>
                <div class="hp-container">
                    <div class="hp-label">AI: <span id="pc-hp-text">100</span></div>
                    <div class="hp-bar-bg"><div id="pc-hp-bar" class="hp-bar-fill"></div></div>
                </div>
            </div>

            <div class="result-board">
                <div class="player-hand">
                    <h3>гҒӮгҒӘгҒҹ (<span id="input-source">-</span>)</h3>
                    <div id="user-hand-display" class="hand-icon">вқ”</div>
                </div>
                <div class="vs">VS</div>
                <div class="pc-hand">
                    <h3>AI</h3>
                    <div id="pc-hand-display" class="hand-icon">вқ”</div>
                </div>
            </div>
            
            <h2 id="result-text" class="result-text"></h2>
            <button id="reset-btn" style="display: none;">ж¬ЎгҒ®гғ©гӮҰгғігғүгҒё</button>
        </div>
    </div>
    
    <script src="script.js?v=9"></script>
</body>
</html>
